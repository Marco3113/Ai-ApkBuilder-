name: Build APK Builder APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Restructure flat files into Android project layout
        run: |
          mkdir -p app/src/main/java/com/apkbuilder/app
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/assets

          mv AndroidManifest.xml         app/src/main/
          mv MainActivity.java           app/src/main/java/com/apkbuilder/app/
          mv activity_main.xml           app/src/main/res/layout/
          mv strings.xml                 app/src/main/res/values/
          mv styles.xml                  app/src/main/res/values/
          mv network_security_config.xml app/src/main/res/xml/
          mv ic_logo.xml                 app/src/main/res/drawable/
          mv index.html                  app/src/main/assets/
          mv proguard-rules.pro          app/

          printf "plugins { id 'com.android.application' }\nandroid {\n    namespace 'com.apkbuilder.app'\n    compileSdk 34\n    defaultConfig {\n        applicationId \"com.apkbuilder.app\"\n        minSdk 26\n        targetSdk 34\n        versionCode 1\n        versionName \"1.0\"\n    }\n    buildTypes { release { minifyEnabled false } }\n    compileOptions { sourceCompatibility JavaVersion.VERSION_11; targetCompatibility JavaVersion.VERSION_11 }\n}\ndependencies {\n    implementation 'androidx.appcompat:appcompat:1.6.1'\n    implementation 'com.google.android.material:material:1.11.0'\n    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'\n}\n" > app/build.gradle

          printf "plugins { id 'com.android.application' version '8.7.0' apply false }\n" > build.gradle

          echo "=== Final structure ==="
          find . -not -path './.git/*' | sort

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: APKBuilder-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
